<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KIM-1 Emulator</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a1a;
      color: #ccc;
      font-family: monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 20px;
      gap: 16px;
      min-height: 100vh;
    }

    /* ── Header bar ── */
    #header {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    h1 { font-size: 0.9rem; color: #888; letter-spacing: 4px; text-transform: uppercase; }

    select {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 4px 8px;
    }
    select:focus { outline: none; border-color: #666; }

    label { font-size: 0.75rem; color: #666; }

    /* ── 7-segment display ── */
    #display-wrap {
      background: #0d0d0d;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 14px 20px 10px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 6px;
    }

    canvas#display {
      display: block;
      image-rendering: pixelated;
    }

    #display-labels {
      display: flex;
      font-size: 0.6rem;
      color: #555;
      letter-spacing: 1px;
      width: 100%;
      justify-content: space-around;
      padding: 0 4px;
    }

    /* ── Keyboard ── */
    #keyboard {
      display: grid;
      grid-template-columns: repeat(4, 58px);
      gap: 6px;
    }

    .key {
      background: #2a2a2a;
      border: 1px solid #444;
      border-bottom: 3px solid #555;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.85rem;
      font-weight: bold;
      height: 46px;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 2px;
      transition: background 0.05s;
    }

    .key .label-main { font-size: 1rem; font-weight: bold; color: #eee; }
    .key .label-kbd  { font-size: 0.55rem; color: #555; }

    .key:active, .key.pressed {
      background: #2e4a2e;
      border-bottom-width: 1px;
      transform: translateY(2px);
      color: #8f8;
    }

    /* SST toggle — stays green when active */
    .key.key-sst-on {
      background: #1a3a1a;
      border-color: #4a8a4a;
      color: #6fdf6f;
    }
    .key.key-sst-on .label-main { color: #6fdf6f; }
    .key.key-sst-on .label-sub  { font-size: 0.55rem; color: #4a8a4a; }

    /* RS key — red tint */
    #key-rs {
      background: #3a1a1a;
      border-color: #8a3a3a;
      color: #f88;
    }
    #key-rs:active, #key-rs.pressed {
      background: #5a2a2a;
      color: #faa;
    }

    /* ── Bottom row: RS + SST indicator ── */
    #bottom-row {
      display: flex;
      gap: 10px;
      align-items: center;
      justify-content: center;
    }

    /* ── TTY Terminal ── */
    #terminal-wrap {
      background: #0d0d0d;
      border: 2px solid #333;
      border-radius: 8px;
      padding: 12px;
      width: 480px;
      max-width: 100%;
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    #terminal-title {
      font-size: 0.7rem;
      color: #666;
      letter-spacing: 3px;
      text-transform: uppercase;
    }

    #terminal-output {
      background: #080808;
      border: 1px solid #222;
      border-radius: 4px;
      color: #33ff33;
      font-family: monospace;
      font-size: 0.85rem;
      height: 200px;
      overflow-y: auto;
      padding: 8px;
      white-space: pre-wrap;
      word-break: break-all;
    }

    #terminal-input-row {
      display: flex;
      gap: 6px;
    }

    #terminal-input {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      color: #ccc;
      flex: 1;
      font-family: monospace;
      font-size: 0.85rem;
      padding: 4px 8px;
    }
    #terminal-input:focus { outline: none; border-color: #555; }

    #terminal-send, #terminal-clear {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 4px 10px;
    }
    #terminal-send:hover, #terminal-clear:hover { background: #333; }

    /* ── Tape controls ── */
    #tape-wrap {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      align-items: center;
      justify-content: center;
      max-width: 480px;
    }

    button {
      background: #2a2a2a;
      border: 1px solid #444;
      border-radius: 4px;
      color: #ccc;
      cursor: pointer;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 5px 12px;
      transition: background 0.1s;
    }
    button:hover { background: #333; }
    button:disabled { opacity: 0.4; cursor: default; }

    button.tape-active {
      background: #4a1a1a;
      border-color: #a44;
      color: #f88;
    }

    #tape-info {
      font-size: 0.7rem;
      color: #555;
      text-align: center;
      width: 100%;
    }

    /* Address range inputs for PAP save */
    .addr-input {
      background: #111;
      border: 1px solid #333;
      border-radius: 4px;
      color: #ccc;
      font-family: monospace;
      font-size: 0.8rem;
      padding: 4px 6px;
      width: 56px;
      text-align: center;
    }
    .addr-input:focus { outline: none; border-color: #555; }

    .sep { color: #333; }

    /* ── Overlay (click-to-start) ── */
    #overlay {
      position: fixed;
      inset: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(0,0,0,0.88);
      font-size: 1rem;
      color: #888;
      cursor: pointer;
      z-index: 100;
    }
    #overlay span {
      border: 1px solid #555;
      padding: 14px 32px;
      border-radius: 6px;
      letter-spacing: 2px;
    }
  </style>
</head>
<body>

<!-- Header -->
<div id="header">
  <h1>KIM-1 Emulator</h1>
  <span class="sep">|</span>
  <label for="ram-select">RAM:</label>
  <select id="ram-select">
    <option value="1k">1K (stock)</option>
    <option value="4k" selected>4K (KIM-2)</option>
    <option value="8k">8K (KIM-3)</option>
    <option value="64k">64K (full)</option>
  </select>
</div>

<!-- 7-segment display -->
<div id="display-wrap">
  <canvas id="display"></canvas>
  <div id="display-labels">
    <span>A</span><span>A</span>
    <span>&nbsp;</span>
    <span>A</span><span>A</span>
    <span>&nbsp;</span>
    <span>D</span><span>D</span>
  </div>
</div>

<!-- Main keyboard (6 rows × 4 cols) -->
<div id="keyboard">
  <!-- Row 0: GO ST BS SST -->
  <div class="key" data-key="kbgo">  <span class="label-main">GO</span>  <span class="label-kbd">↵</span></div>
  <div class="key" data-key="kbst">  <span class="label-main">ST</span>  <span class="label-kbd">S</span></div>
  <div class="key" data-key="kbbs">  <span class="label-main">BS</span>  <span class="label-kbd">⌫</span></div>
  <div class="key" id="key-sst" data-key="kbsst"><span class="label-main">SST</span><span class="label-sub" id="sst-sub">OFF</span></div>
  <!-- Row 1: AD DA PC + -->
  <div class="key" data-key="kbad">  <span class="label-main">AD</span>  <span class="label-kbd">Z</span></div>
  <div class="key" data-key="kbda">  <span class="label-main">DA</span>  <span class="label-kbd">X</span></div>
  <div class="key" data-key="kbpc">  <span class="label-main">PC</span>  <span class="label-kbd">P</span></div>
  <div class="key" data-key="kbplus"><span class="label-main">+</span>   <span class="label-kbd">SPC</span></div>
  <!-- Row 2: C D E F -->
  <div class="key" data-key="kbc"><span class="label-main">C</span><span class="label-kbd">C</span></div>
  <div class="key" data-key="kbd"><span class="label-main">D</span><span class="label-kbd">D</span></div>
  <div class="key" data-key="kbe"><span class="label-main">E</span><span class="label-kbd">E</span></div>
  <div class="key" data-key="kbf"><span class="label-main">F</span><span class="label-kbd">F</span></div>
  <!-- Row 3: 8 9 A B -->
  <div class="key" data-key="kb8"><span class="label-main">8</span><span class="label-kbd">8</span></div>
  <div class="key" data-key="kb9"><span class="label-main">9</span><span class="label-kbd">9</span></div>
  <div class="key" data-key="kba"><span class="label-main">A</span><span class="label-kbd">A</span></div>
  <div class="key" data-key="kbb"><span class="label-main">B</span><span class="label-kbd">B</span></div>
  <!-- Row 4: 4 5 6 7 -->
  <div class="key" data-key="kb4"><span class="label-main">4</span><span class="label-kbd">4</span></div>
  <div class="key" data-key="kb5"><span class="label-main">5</span><span class="label-kbd">5</span></div>
  <div class="key" data-key="kb6"><span class="label-main">6</span><span class="label-kbd">6</span></div>
  <div class="key" data-key="kb7"><span class="label-main">7</span><span class="label-kbd">7</span></div>
  <!-- Row 5: 0 1 2 3 -->
  <div class="key" data-key="kb0"><span class="label-main">0</span><span class="label-kbd">0</span></div>
  <div class="key" data-key="kb1"><span class="label-main">1</span><span class="label-kbd">1</span></div>
  <div class="key" data-key="kb2"><span class="label-main">2</span><span class="label-kbd">2</span></div>
  <div class="key" data-key="kb3"><span class="label-main">3</span><span class="label-kbd">3</span></div>
</div>

<!-- RS button (below keyboard, separate) -->
<div id="bottom-row">
  <div class="key" id="key-rs" data-key="kbrs" style="width:58px">
    <span class="label-main">RS</span>
    <span class="label-kbd">ESC</span>
  </div>
</div>

<!-- TTY Terminal -->
<div id="terminal-wrap">
  <div id="terminal-title">TTY Terminal</div>
  <pre id="terminal-output"></pre>
  <div id="terminal-input-row">
    <input type="text" id="terminal-input" placeholder="Type and press Enter or Send…" autocomplete="off" spellcheck="false">
    <button id="terminal-send">Send</button>
    <button id="terminal-clear">Clear</button>
  </div>
</div>

<!-- Tape controls -->
<div id="tape-wrap">
  <button id="btn-rec">⏺ Rec</button>
  <button id="btn-play">▶ Play</button>
  <button id="btn-stop">⏹ Stop</button>
  <span class="sep">|</span>
  <button id="btn-load-pap">📂 Load .pap</button>
  <input type="file" id="file-pap" accept=".pap" style="display:none">
  <label for="pap-start" style="font-size:0.75rem;color:#555">Save:</label>
  <input type="text" class="addr-input" id="pap-start" value="0200" maxlength="4" title="Start address (hex)">
  <span class="sep">–</span>
  <input type="text" class="addr-input" id="pap-end"   value="02FF" maxlength="4" title="End address (hex)">
  <button id="btn-save-pap">💾 Save .pap</button>
  <div id="tape-info">No tape</div>
</div>

<!-- Click-to-start overlay -->
<div id="overlay"><span>Click to start KIM-1</span></div>

<script type="module">
  import { createKIM } from "./kim1.js";

  const FCPU = 1_000_000;
  const FPS  = 60;
  const T_PER_FRAME = Math.round(FCPU / FPS);

  // ── 7-segment display canvas ───────────────────────────────────────────
  //
  // Digit cell geometry (internal, before CSS 2× scaling):
  //   DW × DH = 26 × 46 px
  //   GAP between digits = 6 px
  //   Narrow spacer between AA–AA–DD groups = 12 px
  //
  // Segment bit mapping: bit0=a(top) bit1=b(top-R) bit2=c(bot-R)
  //   bit3=d(bot) bit4=e(bot-L) bit5=f(top-L) bit6=g(mid)
  //   (no decimal point on KIM-1)

  const DW  = 26;
  const DH  = 46;
  const GAP = 6;
  const SP  = 12;   // spacer width between groups
  const DIGITS = 6;
  // x-offsets for each digit (groups: 0–1, 2–3, 4–5)
  const digitX = [
    0,
    DW + GAP,
    DW * 2 + GAP * 2 + SP,
    DW * 3 + GAP * 3 + SP,
    DW * 4 + GAP * 4 + SP * 2,
    DW * 5 + GAP * 5 + SP * 2,
  ];
  const CANVAS_W = DW * 6 + GAP * 5 + SP * 2;
  const CANVAS_H = DH + 8;

  // Segment rectangles [bit, x, y, w, h] within one digit cell (0-origin)
  const SEG_RECTS = [
    [0,  3,  0, 20,  4],   // a — top horizontal
    [1, 22,  4,  4, 18],   // b — top-right vertical
    [2, 22, 26,  4, 18],   // c — bottom-right vertical
    [3,  3, 44, 20,  4],   // d — bottom horizontal
    [4,  0, 26,  4, 18],   // e — bottom-left vertical
    [5,  0,  4,  4, 18],   // f — top-left vertical
    [6,  3, 22, 20,  4],   // g — middle horizontal
  ];

  const canvas = document.getElementById("display");
  canvas.width  = CANVAS_W;
  canvas.height = CANVAS_H;
  canvas.style.width  = `${CANVAS_W * 2}px`;
  canvas.style.height = `${CANVAS_H * 2}px`;

  const ctx = canvas.getContext("2d");

  // Afterglow: preserve last non-null segment value per digit
  const afterglow = new Array(DIGITS).fill(0);

  const renderDisplay = (display) => {
    ctx.fillStyle = "#080808";
    ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

    for (let d = 0; d < DIGITS; d++) {
      if (display[d] !== null) afterglow[d] = display[d];
      const val = afterglow[d];
      const ox  = digitX[d];
      const oy  = 4;

      for (const [bit, rx, ry, rw, rh] of SEG_RECTS) {
        ctx.fillStyle = (val >> bit) & 1 ? "#ff4400" : "#2a1100";
        ctx.fillRect(ox + rx, oy + ry, rw, rh);
      }
    }
  };

  renderDisplay(new Array(DIGITS).fill(0));

  // ── Keyboard state ────────────────────────────────────────────────────
  const keyState = {};
  let sstOn = false;

  const KEY_MAP = {
    13:  "kbgo",    // Enter
    83:  "kbst",    // S
    8:   "kbbs",    // Backspace
    27:  "kbrs",    // Escape
    // Hex digits
    48:  "kb0",  96:  "kb0",
    49:  "kb1",  97:  "kb1",
    50:  "kb2",  98:  "kb2",
    51:  "kb3",  99:  "kb3",
    52:  "kb4",  100: "kb4",
    53:  "kb5",  101: "kb5",
    54:  "kb6",  102: "kb6",
    55:  "kb7",  103: "kb7",
    56:  "kb8",  104: "kb8",
    57:  "kb9",  105: "kb9",
    65:  "kba",
    66:  "kbb",
    67:  "kbc",
    68:  "kbd",
    69:  "kbe",
    70:  "kbf",
    // Function keys
    90:  "kbad",    // Z
    88:  "kbda",    // X
    80:  "kbpc",    // P
    32:  "kbplus",  // Space
    145: "kbsst",   // ScrollLock
    9:   "kbsst",   // Tab
  };

  const setKeyVisual = (name, on) => {
    const el = document.querySelector(`[data-key="${name}"]`);
    if (el) el.classList.toggle("pressed", on);
  };

  const updateSSTVisual = () => {
    const el = document.getElementById("key-sst");
    const sub = document.getElementById("sst-sub");
    el.classList.toggle("key-sst-on", sstOn);
    if (sub) sub.textContent = sstOn ? "ON" : "OFF";
  };

  const keyDown = (name) => {
    if (!name || !kim) return;
    if (name === "kbrs") { kim.reset(); return; }
    if (name === "kbst") { kim.nmi(); return; }
    if (name === "kbsst") {
      sstOn = !sstOn;
      updateSSTVisual();
      return;
    }
    keyState[name] = true;
    setKeyVisual(name, true);
  };

  const keyUp = (name) => {
    if (!name) return;
    if (name === "kbrs" || name === "kbst" || name === "kbsst") return;
    delete keyState[name];
    setKeyVisual(name, false);
  };

  window.addEventListener("keydown", (e) => {
    if (e.altKey || e.metaKey || e.ctrlKey) return;
    // Don't hijack terminal input field
    if (document.activeElement === document.getElementById("terminal-input")) return;
    const name = KEY_MAP[e.keyCode];
    if (name) { e.preventDefault(); keyDown(name); }
  }, { capture: true });

  window.addEventListener("keyup", (e) => {
    const name = KEY_MAP[e.keyCode];
    if (name) { e.preventDefault(); keyUp(name); }
  }, { capture: true });

  document.querySelectorAll(".key[data-key]").forEach((el) => {
    const name = el.dataset.key;
    el.addEventListener("mousedown",  () => keyDown(name));
    el.addEventListener("mouseup",    () => keyUp(name));
    el.addEventListener("mouseleave", () => { if (name !== "kbsst") keyUp(name); });
    el.addEventListener("touchstart", (e) => { e.preventDefault(); keyDown(name); });
    el.addEventListener("touchend",   (e) => { e.preventDefault(); keyUp(name); });
  });

  const buildKeyMatrix = () => ({ ...keyState, kbsst: sstOn });

  // ── Terminal ──────────────────────────────────────────────────────────
  const termOutput = document.getElementById("terminal-output");
  const termInput  = document.getElementById("terminal-input");

  const appendTerminal = (str) => {
    termOutput.textContent += str;
    termOutput.scrollTop = termOutput.scrollHeight;
  };

  document.getElementById("terminal-send").addEventListener("click", () => {
    if (!kim) return;
    const val = termInput.value;
    if (!val) return;
    const toSend = val.toUpperCase() + "\r";
    appendTerminal(toSend);   // local echo
    kim.serial.input(toSend);
    termInput.value = "";
  });

  termInput.addEventListener("keydown", (e) => {
    if (e.key === "Enter") {
      e.preventDefault();
      document.getElementById("terminal-send").click();
    }
  });

  document.getElementById("terminal-clear").addEventListener("click", () => {
    termOutput.textContent = "";
  });

  // ── RAM selector ─────────────────────────────────────────────────────
  let currentRamSize = "4k";
  document.getElementById("ram-select").addEventListener("change", (e) => {
    currentRamSize = e.target.value;
    if (kim) {
      kim = createKIM({ ramSize: currentRamSize });
      kim.reset();
    }
  });

  // ── Tape controls ─────────────────────────────────────────────────────
  const tapeInfo = document.getElementById("tape-info");

  const updateTapeInfo = () => {
    if (!kim) return;
    if (kim.tape.isRecording()) {
      tapeInfo.textContent = `⏺ Recording… (${kim.tape.getRecorded().length} intervals)`;
      document.getElementById("btn-rec").classList.add("tape-active");
    } else if (kim.tape.isPlaying()) {
      tapeInfo.textContent = "▶ Playing…";
      document.getElementById("btn-rec").classList.remove("tape-active");
    } else {
      const len = kim.tape.getRecorded().length;
      tapeInfo.textContent = len > 1 ? `Tape: ${len} intervals` : "No tape";
      document.getElementById("btn-rec").classList.remove("tape-active");
    }
  };

  document.getElementById("btn-rec").addEventListener("click", () => {
    if (kim) { kim.tape.record(); updateTapeInfo(); }
  });

  document.getElementById("btn-play").addEventListener("click", () => {
    if (!kim) return;
    kim.tape.setReadBuffer(kim.tape.getRecorded());
    kim.tape.play();
    updateTapeInfo();
  });

  document.getElementById("btn-stop").addEventListener("click", () => {
    if (kim) { kim.tape.stop(); updateTapeInfo(); }
  });

  document.getElementById("btn-load-pap").addEventListener("click", () => {
    document.getElementById("file-pap").click();
  });

  document.getElementById("file-pap").addEventListener("change", (e) => {
    const file = e.target.files[0];
    if (!file || !kim) return;
    const reader = new FileReader();
    reader.onload = (ev) => {
      const result = kim.tape.loadPAP(ev.target.result);
      if (result.blocks > 0) {
        let msg = `Loaded ${result.blocks} block(s) into RAM — use AD+addr+GO to run`;
        if (result.warnings && result.warnings.length > 0) msg += ` [${result.warnings.length} warning(s)]`;
        tapeInfo.textContent = msg;
        if (result.warnings && result.warnings.length > 0) console.warn("PAP warnings:", result.warnings);
      } else {
        tapeInfo.textContent = `No data loaded from ${file.name}`;
        console.warn("PAP load returned 0 blocks", result.warnings);
      }
    };
    reader.readAsText(file);
    e.target.value = "";
  });

  document.getElementById("btn-save-pap").addEventListener("click", () => {
    if (!kim) return;
    const startVal = parseInt(document.getElementById("pap-start").value, 16);
    const endVal   = parseInt(document.getElementById("pap-end").value,   16);
    if (isNaN(startVal) || isNaN(endVal) || startVal > endVal) {
      tapeInfo.textContent = "Invalid address range";
      return;
    }
    const text = kim.tape.savePAP(startVal, endVal);
    const blob = new Blob([text], { type: "text/plain" });
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement("a");
    a.href     = url;
    a.download = "program.pap";
    a.click();
    URL.revokeObjectURL(url);
    tapeInfo.textContent = `Saved 0x${startVal.toString(16).toUpperCase()}–0x${endVal.toString(16).toUpperCase()}`;
  });

  setInterval(updateTapeInfo, 500);

  // ── Emulator instance + main loop ─────────────────────────────────────
  let kim     = null;
  let running = false;

  const start = () => {
    if (running) return;
    running = true;

    document.getElementById("overlay").style.display = "none";

    kim = createKIM({ ramSize: currentRamSize });
    kim.reset();

    const rafLoop = () => {
      if (!running) return;

      const result = kim.frame(T_PER_FRAME, buildKeyMatrix());
      if (result.initialized) {
        renderDisplay(result.display);
      }

      // Drain serial output to terminal
      if (kim.serial.outputReady()) {
        appendTerminal(kim.serial.getOutput());
      }

      requestAnimationFrame(rafLoop);
    };

    requestAnimationFrame(rafLoop);
  };

  document.getElementById("overlay").addEventListener("click", start);
</script>
</body>
</html>
